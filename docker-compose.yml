services:
  glacier-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: glacier-depth-vis:dev
    container_name: glacier-depth-vis-dev
    ports:
      - "8884:8080"
    environment:
      HOME: /workspace
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
      - ${HOME}/.codex:/workspace/.codex
      - ${HOME}/.agents:/workspace/.agents
    command: ["sleep", "infinity"]
    tty: true
    stdin_open: true
